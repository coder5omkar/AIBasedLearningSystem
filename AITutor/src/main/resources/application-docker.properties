# Server Configuration
server.port=8080

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://host.docker.internal:3306/aitutor?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=admin

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Ollama Configuration - Use container name
spring.ai.ollama.base-url=http://ollama:11434
spring.ai.ollama.chat.model=llama3.2:3b

# OpenAI Configuration (disabled in docker; use UI to configure)
spring.ai.openai.chat.enabled=false
spring.ai.openai.api-key=placeholder

# Logging
logging.level.com.aitutor=DEBUG
logging.level.org.springframework.ai=DEBUG
logging.level.org.springframework.web=INFO