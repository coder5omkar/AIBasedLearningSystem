# Server Configuration
server.port=8080

# H2 Database Configuration
spring.datasource.url=jdbc:h2:file:/data/chatdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Ollama Configuration - Use container name
spring.ai.ollama.base-url=http://ollama:11434
spring.ai.ollama.chat.model=llama3.2:3b

# OpenAI Configuration (disabled in docker; use UI to configure)
spring.ai.openai.chat.enabled=false
spring.ai.openai.api-key=placeholder

# Logging
logging.level.com.aitutor=DEBUG
logging.level.org.springframework.ai=DEBUG
logging.level.org.springframework.web=INFO