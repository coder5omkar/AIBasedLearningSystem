apiVersion: apps/v1
kind: Deployment
metadata:
  name: aitutor-frontend
  namespace: aitutor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aitutor-frontend
  template:
    metadata:
      labels:
        app: aitutor-frontend
    spec:
      containers:
        - name: frontend
          image: aitutor-frontend:v3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: aitutor-frontend
  namespace: aitutor
spec:
  selector:
    app: aitutor-frontend
  ports:
    - port: 80
      targetPort: 80
